experiment_name: antmaze-large

dataset:
  dataset_id: D4RL/antmaze/large-diverse-v1
  eval_dataset_id: D4RL/antmaze/large-diverse-v1
  normalize_observations: true
  reward_mode: shaped
  max_episodes: null
  download: true

reward:
  mode: progress
  distance_scale: 0.5
  success_bonus: 1.0
  step_penalty: 0.0
  clip_value: 1.0

diffusion:
  steps: 20
  beta_start: 0.0001
  beta_end: 0.02
  guidance_scale: 5.0
  batch_action_samples: 32
  gradient_epsilon: 1.0e-6

teacher:
  hidden_dim: 256
  hidden_layers: 3
  time_embedding_dim: 32
  learning_rate: 0.001
  discount: 0.99
  tau: 0.005
  reward_scale: 0.2
  consistency_coef: 1.0
  conservative_coef: 0.2
  conservative_actions: 16
  action_l2_coef: 1.0e-4
  dataset_target_warmstart_steps: 20000
  deterministic_target_sampling: true
  grad_clip_norm: 10.0
  prior_noise_scale: 0.05
  prior_guidance_coef: 2.0
  use_double_q: true

prior:
  hidden_dim: 256
  hidden_layers: 3
  learning_rate: 0.0003
  pretrain_steps: 15000
  grad_clip_norm: 10.0

student:
  hidden_dim: 256
  hidden_layers: 3
  learning_rate: 0.0003
  distill_coef: 1.0
  behavior_cloning_coef: 1.0
  warmstart_behavior_cloning_steps: 15000
  warmstart_behavior_cloning_coef: 1.0
  grad_clip_norm: 10.0

training:
  seed: 11
  device: auto
  batch_size: 256
  total_steps: 30000
  teacher_updates_per_step: 1
  student_updates_per_step: 1
  eval_every: 3000
  eval_episodes: 5
  max_eval_steps: 1000
  log_every: 100
  checkpoint_every: 3000
  work_dir: runs/antmaze-large
